<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoadSense Interface — Opérations Réseau</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/0.161.0/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.161.0/examples/js/controls/OrbitControls.js"></script>

    <style>
        :root {
            --bg-primary: #0a0b10;
            --bg-secondary: #14161f;
            --text-primary: #e4e6eb;
            --text-muted: #9499a6;
            --accent: #00e5ff; /* Cyan Électrique */
            --border: #2d313f;
            --danger: #ff3b3b;
            --success: #00e676;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; outline: none; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-primary); color: var(--text-primary); letter-spacing: -0.02em; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        h1, h2, h3 { font-weight: 800; letter-spacing: -0.04em; }
        .mono { font-family: 'JetBrains Mono', monospace; }

        /* Conteneur 3D */
        #three-container { width: 100%; height: 100%; position: relative; background: var(--bg-primary); }
        canvas { display: block; width: 100% !important; height: 100% !important; outline: none; }

        /* Layout UI */
        #app-layout { display: grid; grid-template-columns: 280px 1fr 320px; height: 100%; overflow: hidden; }
        
        /* Sidebar et Panneaux */
        .panel { background: var(--bg-secondary); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 20px; overflow-y: auto; }
        .panel-right { border-right: none; border-left: 1px solid var(--border); }
        
        /* Navigation Tabs */
        .nav-item { padding: 12px 16px; border-radius: 6px; cursor: pointer; transition: 0.2s; font-size: 13px; font-weight: 600; color: var(--text-muted); display: flex; align-items: center; gap: 10px; margin-bottom: 4px; }
        .nav-item:hover { background: rgba(255,255,255,0.03); color: var(--text-primary); }
        .nav-item.active { background: rgba(0,229,255,0.08); color: var(--accent); border: 1px solid rgba(0,229,255,0.2); }

        /* Cards et Data */
        .data-card { background: rgba(255,255,255,0.02); border: 1px solid var(--border); border-radius: 8px; padding: 16px; margin-bottom: 16px; transition: 0.2s; }
        .data-card:hover { border-color: var(--accent); box-shadow: 0 0 15px rgba(0,229,255,0.1); }
        .label { font-size: 11px; text-transform: uppercase; color: var(--text-muted); font-weight: 600; letter-spacing: 0.05em; }
        .value { font-size: 28px; font-weight: 800; color: var(--text-primary); }
        .unit { font-size: 14px; color: var(--text-muted); font-weight: 400; margin-left: 4px; }

        /* Feed */
        .feed-item { font-size: 12px; padding: 10px; border-bottom: 1px solid var(--border); color: var(--text-muted); transition: 0.2s; }
        .feed-item:hover { background: rgba(255,255,255,0.01); color: var(--text-primary); }
        .feed-ts { font-family: 'JetBrains Mono'; color: var(--accent); font-weight: 700; margin-right: 8px; }

        /* Badge */
        .badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        
        /* Overlay sur la carte 3D */
        .map-overlay { position: absolute; bottom: 20px; right: 20px; background: rgba(20,22,31,0.8); border: 1px solid var(--border); border-radius: 6px; padding: 8px 12px; font-size: 11px; color: var(--text-muted); pointer-events: none; backdrop-filter: blur(4px); }
    </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef, useMemo } = React;

// --- CONFIGURATION ---
const PALETTE = { accent: 0x00e5ff, grid: 0x2d313f, danger: 0xff3b3b, success: 0x00e676, truck: 0x00a3ff };

// --- SIMULATION DATA (Géométrie de la ville simplifiée en grille) ---
const GRID_SIZE = 100;
const ROAD_SCORE_THRESHOLD = 45; // Score sous lequel la route devient critique

const INITIAL_ROADS = [
    { id: "R1", start: [20, 20], end: [80, 20], name: "Axe Portuaire N", score: 88 },
    { id: "R2", start: [20, 20], end: [20, 80], name: "Rocade Ouest", score: 65 },
    { id: "R3", start: [20, 80], end: [80, 80], name: "Axe Tertiaire S", score: 32 }, // Critique
    { id: "R4", start: [80, 20], end: [80, 80], name: "Voie Rapide E", score: 71 },
    { id: "R5", start: [20, 50], end: [80, 50], name: "Traverse Centrale", score: 40 } // Limite
];

const INITIAL_TRUCKS = [
    { id: "T-10", pos: [20, 20], speed: 0.1, targetIndex: 0, roadId: "R1" },
    { id: "T-22", pos: [80, 80], speed: 0.08, targetIndex: 1, roadId: "R3" },
    { id: "T-05", pos: [20, 50], speed: 0.12, targetIndex: 0, roadId: "R5" }
];

// --- COMPOSANT THREE.JS CITY MAP (Le Cœur Interactif) ---
function City3DMap({ trucks, roads, onSelectObject }) {
    const containerRef = useRef();
    const sceneRef = useRef();
    const trucksRef = useRef({}); // Stockage des meshes pour mise à jour

    // Initialisation de la scène Three.js
    useEffect(() => {
        const container = containerRef.current;
        const width = container.clientWidth;
        const height = container.clientHeight;

        // 1. Scene & Camera
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0b10); // var(--bg-primary)
        sceneRef.current = scene;

        // Caméra Perspective pour de la profondeur
        const camera = new THREE.PerspectiveCamera(50, width / height, 0.1, 1000);
        camera.position.set(120, 100, 120); // Vue isométrique de coin
        camera.lookAt(50, 0, 50); // Centre de la grille

        // 2. Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
        renderer.setSize(width, height);
        renderer.setPixelRatio(window.devicePixelRatio);
        container.appendChild(renderer.domElement);

        // 3. Controls (Orbit)
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.screenSpacePanning = false;
        controls.minDistance = 20;
        controls.maxDistance = 250;
        controls.maxPolarAngle = Math.PI / 2.1; // Empêcher de passer sous le sol

        // 4. Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(50, 100, 50);
        scene.add(directionalLight);
        const pointLight = new THREE.PointLight(PALETTE.accent, 1, 100);
        pointLight.position.set(50, 10, 50);
        scene.add(pointLight);

        // 5. Environnement : Grille au sol (Topologie de la ville)
        const gridHelper = new THREE.GridHelper(GRID_SIZE, 20, PALETTE.grid, 0x1a1c24);
        gridHelper.position.set(50, 0, 50);
        scene.add(gridHelper);

        // Plan de sol subtil
        const groundGeo = new THREE.PlaneGeometry(GRID_SIZE * 2, GRID_SIZE * 2);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x08090d, roughness: 1, metalness: 0 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.set(50, -0.1, 50);
        scene.add(ground);

        // 6. Rendu des Routes (Lignes lumineuses)
        const roadGroup = new THREE.Group();
        roads.forEach(road => {
            const points = [];
            points.push(new THREE.Vector3(road.start[0], 0.2, road.start[1]));
            points.push(new THREE.Vector3(road.end[0], 0.2, road.end[1]));
            
            const geometry = new THREE.BufferGeometry().setFromPoints(points);
            
            // Matériau émissif pour l'effet néon
            const isCritical = road.score < ROAD_SCORE_THRESHOLD;
            const material = new THREE.LineBasicMaterial({ 
                color: isCritical ? PALETTE.danger : 0x3d4357, 
                linewidth: 2 
            });
            const line = new THREE.Line(geometry, material);
            line.userData = { id: road.id, type: 'road', name: road.name, score: road.score };
            roadGroup.add(line);
        });
        scene.add(roadGroup);

        // 7. Animation Loop
        const clock = new THREE.Clock();
        const animate = () => {
            const delta = clock.getDelta();
            const elapsed = clock.getElapsedTime();
            
            requestAnimationFrame(animate);
            controls.update();

            // Effet d'oscillation lumineuse sur les routes critiques
            roadGroup.children.forEach(line => {
                if (line.userData.score < ROAD_SCORE_THRESHOLD) {
                    // Clignotement subtil
                    line.material.opacity = 0.5 + Math.sin(elapsed * 4) * 0.3;
                    line.material.transparent = true;
                }
            });

            // Animation des meshes de camions (rotation)
            Object.values(trucksRef.current).forEach(mesh => {
                mesh.rotation.y += 0.5 * delta;
                mesh.rotation.x += 0.2 * delta;
            });

            renderer.render(scene, camera);
        };
        animate();

        // 8. Resize Handling
        const handleResize = () => {
            const w = containerRef.current.clientWidth;
            const h = containerRef.current.clientHeight;
            camera.aspect = w / h;
            camera.updateProjectionMatrix();
            renderer.setSize(w, h);
        };
        window.addEventListener('resize', handleResize);

        // Raycaster pour l'interactivité (sélection)
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        const onClick = (event) => {
            const rect = renderer.domElement.getBoundingClientRect();
            mouse.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
            mouse.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects([...roadGroup.children], false);
            if (intersects.length > 0) {
                onSelectObject(intersects[0].object.userData);
            } else {
                onSelectObject(null);
            }
        };
        renderer.domElement.addEventListener('click', onClick);

        // Cleanup
        return () => {
            window.removeEventListener('resize', handleResize);
            renderer.domElement.removeEventListener('click', onClick);
            container.removeChild(renderer.domElement);
            renderer.dispose();
        };
    }, [roads, onSelectObject]);

    // Mise à jour des positions des camions (Effet React -> Three)
    useEffect(() => {
        const scene = sceneRef.current;
        if (!scene) return;

        trucks.forEach(truck => {
            if (!trucksRef.current[truck.id]) {
                // Créer la forme géométrique : Octaèdre (Style épuré, mathématique)
                const geometry = new THREE.OctahedronGeometry(1.5, 0);
                const material = new THREE.MeshStandardMaterial({ 
                    color: PALETTE.truck, 
                    emissive: PALETTE.truck,
                    emissiveIntensity: 0.5,
                    metalness: 0.8,
                    roughness: 0.2,
                    wireframe: false 
                });
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(truck.pos[0], 2, truck.pos[1]); // Élévation 2
                mesh.userData = { id: truck.id, type: 'truck' };
                scene.add(mesh);
                trucksRef.current[truck.id] = mesh;
            } else {
                // Mettre à jour la position existante
                const mesh = trucksRef.current[truck.id];
                mesh.position.set(truck.pos[0], 2, truck.pos[1]);
            }
        });
    }, [trucks]);

    return (
        <div id="three-container" ref={containerRef}>
            <div className="map-overlay mono">
                COORD: UTM_TILE [5.9, 49.3] | AZIMUTH: ACTIVE
            </div>
        </div>
    );
}

// --- MAIN APP ---
function App() {
    const [tab, setTab] = useState("ops");
    const [roads, setRoads] = useState(INITIAL_ROADS);
    const [trucks, setTrucks] = useState(INITIAL_TRUCKS);
    const [feed, setFeed] = useState([]);
    const [selectedObject, setSelectedObject] = useState(null);

    // Moteur de simulation (Mouvement camions + Diagnostic route)
    useEffect(() => {
        const interval = setInterval(() => {
            const ts = new Date().toLocaleTimeString('fr-FR', { hour12: false });
            
            // 1. Déplacer les camions le long de leurs routes
            setTrucks(prev => prev.map(truck => {
                const road = roads.find(r => r.id === truck.roadId);
                if (!road) return truck;
                
                const target = truck.targetIndex === 0 ? road.start : road.end;
                const dx = target[0] - truck.pos[0];
                const dy = target[1] - truck.pos[1];
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                let newPos = [...truck.pos];
                let newTargetIndex = truck.targetIndex;
                
                if (dist < 1) {
                    // Arrivé au point, faire demi-tour
                    newTargetIndex = truck.targetIndex === 0 ? 1 : 0;
                    if(Math.random() > 0.8) {
                        setFeed(f => [{ ts, msg: `Unité ${truck.id} : Point de contrôle atteint sur ${road.name}.`, type: 'log'}, ...f].slice(0, 15));
                    }
                } else {
                    // Avancer vers la cible
                    newPos[0] += (dx / dist) * truck.speed;
                    newPos[1] += (dy / dist) * truck.speed;
                }
                
                return { ...truck, pos: newPos, targetIndex: newTargetIndex };
            }));

            // 2. Simuler dégradation aléatoire de route
            if (Math.random() > 0.9) {
                const roadIndex = Math.floor(Math.random() * roads.length);
                const road = roads[roadIndex];
                const degradeAmt = Math.random() * 5;
                const newScore = Math.max(10, road.score - degradeAmt);
                
                setRoads(prev => prev.map((r, i) => i === roadIndex ? {...r, score: newScore} : r));

                if(newScore < ROAD_SCORE_THRESHOLD && road.score >= ROAD_SCORE_THRESHOLD) {
                    setFeed(f => [{ ts, msg: `ALERTE CRITIQUE : Segment ${road.id} (${road.name}) passé sous seuil d'intégrité (${Math.round(newScore)}%).`, type: 'alarm'}, ...f].slice(0, 15));
                }
            }

        }, 100); // 10Hz simulation update
        return () => clearInterval(interval);
    }, [roads]);

    const globalScore = useMemo(() => Math.round(roads.reduce((a, b) => a + b.score, 0) / roads.length), [roads]);
    const criticalAlerts = useMemo(() => roads.filter(r => r.score < ROAD_SCORE_THRESHOLD).length, [roads]);

    return (
        <div id="app-layout">
            
            {/* PANEL GAUCHE : Navigation & Vue d'ensemble */}
            <aside className="panel">
                <div style={{ display: 'flex', alignItems: 'center', gap: '8px', marginBottom: '32px' }}>
                    <div style={{ background: '#1a1c24', border: `1px solid ${PALETTE.accent}`, width: '28px', height: '28px', borderRadius: '4px', display: 'grid', placeItems: 'center', fontWeight: 800, color: PALETTE.accent, fontSize: '14px' }}>R</div>
                    <h1 style={{ fontSize: '16px', textTransform: 'uppercase', letterSpacing: '0.1em', fontWeight: 700 }}>RoadSense</h1>
                </div>

                <nav style={{ marginBottom: '32px' }}>
                    <div className="label" style={{ marginBottom: '10px' }}>OPÉRATIONS RÉSEAU</div>
                    {[
                        { id: 'ops', label: 'Surveillance Temps Réel' },
                        { id: 'infra', label: 'Registre Infrastructure' },
                        { id: 'analytics', label: 'Analyse Économique' }
                    ].map(item => (
                        <div key={item.id} onClick={() => setTab(item.id)} className={`nav-item ${tab === item.id ? 'active' : ''}`}>
                            <div style={{ width: '6px', height: '6px', borderRadius: '50%', background: tab === item.id ? PALETTE.accent : '#3d4357' }}></div>
                            {item.label}
                        </div>
                    ))}
                </nav>

                <div style={{ marginTop: 'auto' }}>
                    <div className="label" style={{ marginBottom: '12px' }}>KPI RÉSEAU ACTUEL</div>
                    <div className="data-card">
                        <div className="label">Intégrité Globale</div>
                        <div className="value mono">{globalScore}<span className="unit">%</span></div>
                    </div>
                    <div className="data-card" style={{ borderColor: criticalAlerts > 0 ? PALETTE.danger : var(--border) }}>
                        <div className="label">Alertes Critiques</div>
                        <div className="value mono" style={{ color: criticalAlerts > 0 ? PALETTE.danger : var(--text-primary) }}>{criticalAlerts}</div>
                    </div>
                </div>
            </aside>

            {/* ZONE CENTRALE : Carte Three.js */}
            <main style={{ position: 'relative' }}>
                <City3DMap trucks={trucks} roads={roads} onSelectObject={setSelectedObject} />
            </main>

            {/* PANEL DROIT : Contextuel / Feed */}
            <aside className="panel panel-right">
                {tab === 'ops' && (
                    <>
                        <div className="card" style={{ padding: '16px', background: 'rgba(255,255,255,0.01)', border: '1px solid var(--border)', borderRadius: '8px', marginBottom: '20px' }}>
                            <div className="label" style={{ marginBottom: '10px' }}>INSIGHTS IA</div>
                            <p style={{ fontSize: '12px', color: var(--text-muted), lineHeight: '1.5' }}>Algorithme de détection d'anomalies actif. Analyse de vibration sur <span className="mono" style={{color: PALETTE.accent}}>T-10</span> suggère une maintenance préventive sur l'essieu arrière avant 12h d'utilisation.</p>
                        </div>
                        
                        <div className="label" style={{ marginBottom: '12px' }}>FLUX TÉLÉMÉTRIE (LIVE)</div>
                        <div style={{ flex: 1, overflowY: 'auto', borderTop: '1px solid var(--border)' }} className="mono">
                            {feed.map((f, i) => (
                                <div key={i} className="feed-item" style={{ borderLeft: `2px solid ${f.type === 'alarm' ? PALETTE.danger : 'transparent'}` }}>
                                    <span className="feed-ts">{f.ts}</span>
                                    {f.msg}
                                </div>
                            ))}
                            {feed.length === 0 && <p style={{ fontSize: '11px', color: var(--text-muted), padding: '20px' }}>En attente de données capteurs...</p>}
                        </div>
                    </>
                )}

                {tab === 'infra' && (
                    <div className="mono" style={{ fontSize: '11px' }}>
                        <div className="label" style={{ marginBottom: '16px', fontFamily: 'Inter' }}>REGISTRE DÉTAILLÉ DE LA VOIRIE</div>
                        {roads.map(r => (
                            <div key={r.id} style={{ padding: '10px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                                <div>
                                    <span style={{ fontWeight: 700, color: PALETTE.accent }}>{r.id}</span> | {r.name}
                                </div>
                                <span className="badge" style={{ background: r.score < ROAD_SCORE_THRESHOLD ? `${PALETTE.danger}15` : `${PALETTE.success}15`, color: r.score < ROAD_SCORE_THRESHOLD ? PALETTE.danger : PALETTE.success }}>
                                    {r.score}%
                                </span>
                            </div>
                        ))}
                    </div>
                )}

                {tab === 'analytics' && (
                    <>
                        <div className="label" style={{ marginBottom: '16px' }}>PROJECTION ÉCONOMIQUE SUR 12 MOIS</div>
                        <div className="data-card">
                            <div className="label">Budget Maintenance Optimisé (IA)</div>
                            <div className="value mono" style={{color: PALETTE.success}}>412<span className="unit">k€</span></div>
                        </div>
                        <div className="data-card">
                            <div className="label">Réduction Émissions CO2 (estimée)</div>
                            <div className="value mono">14<span className="unit">%</span></div>
                        </div>
                        <p style={{fontSize: '11px', color: var(--text-muted), textAlign:'center', marginTop:'auto', padding:'10px', border:'1px dashed var(--border)', borderRadius:'6px'}}>Modèle prédictif basé sur 140km de voirie scannée.</p>
                    </>
                )}
            </aside>
        </div>
    );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
